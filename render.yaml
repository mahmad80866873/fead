services:
  - type: web
    name: fead-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run start:api
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 4000
      - key: MONGODB_URI
        sync: false

  - type: web
    name: fead-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: VITE_API_BASE
        value: https://fead-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
